name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: write

env:
  BUILD_TYPE: Release
  BUILD_DIR: Builds
  DISPLAY: :0 # linux pluginval needs this
  HOMEBREW_NO_INSTALL_CLEANUP: 1
  SCCACHE_GHA_ENABLED: true
  SCCACHE_CACHE_MULTIARCH: 1

defaults:
  run:
    shell: bash

# jobs are run in paralell on different machines
# all steps run in series
jobs:
  build:
    # don't double run on PRs
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # show all errors for each platform (vs. cancel jobs on error)
      matrix:
        include:
          - name: Linux
            os: ubuntu-24.04
            pluginval-binary: ./pluginval
            extra-flags: -G Ninja
          - name: MacOS
            os: macos-latest
            pluginval-binary: pluginval.app/Contents/MacOS/pluginval
            extra-flags: -G Ninja -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"
          - name: Windows
            os: windows-latest
            pluginval-binary: ./pluginval.exe

    steps:
      # Setup MSVC toolchain and developer command prompt (Windows)
      - uses: ilammy/msvc-dev-cmd@v1

      # Use clang on Linux so we don't introduce a 3rd compiler (Windows and MacOS use MSVC and Clang)
      - name: Set up Clang
        if: runner.os == 'Linux'
        uses: egor-tensin/setup-clang@v1

      # This also starts up our "fake" display (Xvfb), needed for pluginval
      - name: Install JUCE's Linux Deps
        if: runner.os == 'Linux'
        # Thanks to McMartin & co https://forum.juce.com/t/list-of-juce-dependencies-under-linux/15121/44
        run: |
          sudo apt-get update && sudo apt install libasound2-dev libx11-dev libxinerama-dev libxext-dev libfreetype6-dev libcurl4-openssl-dev libwebkit2gtk-4.1-dev libglu1-mesa-dev xvfb ninja-build
          sudo /usr/bin/Xvfb $DISPLAY &

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja

      - name: Install Inno Setup
        if: runner.os == 'Windows'
        run: choco install innosetup

      - name: Install MacOS Deps
        if: ${{ matrix.name == 'MacOS' }}
        run: brew install ninja osxutils

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache the build
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure
        run: cmake -B ${{ env.BUILD_DIR }} -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE}} -DCMAKE_COMPILE_WARNING_AS_ERROR=ON ${{ matrix.extra-flags }} .

      - name: Build
        run: cmake --build ${{ env.BUILD_DIR }} --config ${{ env.BUILD_TYPE }} --parallel 4

      - name: Read in .env from CMake # see GitHubENV.cmake
        run: |
          cat .env # show us the config
          cat .env >> $GITHUB_ENV # pull in our PRODUCT_NAME, etc

      - name: Set additional env vars for next steps
        run: |
          ARTIFACTS_PATH=${{ env.BUILD_DIR }}/${{ env.PROJECT_NAME }}_artefacts/${{ env.BUILD_TYPE }}
          echo "ARTIFACTS_PATH=$ARTIFACTS_PATH" >> $GITHUB_ENV
          echo "VST3_PATH=$ARTIFACTS_PATH/VST3/${{ env.PRODUCT_NAME }}.vst3" >> $GITHUB_ENV
          echo "AU_PATH=$ARTIFACTS_PATH/AU/${{ env.PRODUCT_NAME }}.component" >> $GITHUB_ENV
          echo "STANDALONE_PATH=$ARTIFACTS_PATH/Standalone/${{ env.PRODUCT_NAME }}" >> $GITHUB_ENV
          echo "ARTIFACT_NAME=${{ env.PRODUCT_NAME }}-${{ env.VERSION }}-${{ matrix.name }}" >> $GITHUB_ENV
          echo "INSTALLER_NAME=${{ env.PRODUCT_NAME }}-${{ env.VERSION_DASHED }}-${{ matrix.name }}" >> $GITHUB_ENV

      - name: Pluginval VST3
        run: |
          curl -LO "https://github.com/Tracktion/pluginval/releases/download/v1.0.4/pluginval_${{ matrix.name }}.zip"
          7z x pluginval_${{ matrix.name }}.zip
          ${{ matrix.pluginval-binary }} ${{ matrix.pluginval-flags }} --strictness-level 5 --verbose --validate "${{ env.VST3_PATH }}"

      - name: Pluginval AU
        if: ${{ matrix.name == 'MacOS' }}
        run: |
          ${{ matrix.pluginval-binary }} --strictness-level 5 --verbose --timeout-ms 120000 --validate "${{ env.AU_PATH }}"

      - name: Import Certificates (MacOS)
        uses: apple-actions/import-codesign-certs@v3
        if: ${{ matrix.name == 'MacOS' }}
        with:
          keychain: signing_temp_${{ github.run_id }}
          p12-file-base64: ${{ secrets.CERTIFICATES_P12 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Codesign plugins (MacOS)
        if: ${{ matrix.name == 'MacOS' }}
        run: |
          codesign --force -s "${{ secrets.DEVELOPER_ID_APPLICATION}}" -v "${{ env.VST3_PATH }}" --deep --strict --options=runtime --timestamp
          codesign --force -s "${{ secrets.DEVELOPER_ID_APPLICATION}}" -v "${{ env.AU_PATH }}" --deep --strict --options=runtime --timestamp

      - name: Codesign standalone (MacOS)
        if: ${{ matrix.name == 'MacOS' }}
        run: |
          codesign --force -s "${{ secrets.DEVELOPER_ID_APPLICATION}}" -v "${{ env.STANDALONE_PATH }}.app" --deep --strict --options=runtime --timestamp

      - name: Create indivudal MacOS Installers
        if: ${{ matrix.name == 'MacOS' }}
        working-directory: Installers/MacOS
        run: |
          # Build VST3 package
          pkgbuild --identifier com.rvaudiodesign.pkg.vst3 \
                   --version ${{ env.VERSION }} \
                   --install-location /Library/Audio/Plug-Ins/VST3/ \
                   --root ../../Builds/PoZeTool_artefacts/Release/VST3/ \
                   PoZeTool-MacOS-${{ env.VERSION }}-VST3-UNSIGNED.pkg
          
          # Build AU package
          pkgbuild --identifier com.rvaudiodesign.pkg.au \
                   --version ${{ env.VERSION }} \
                   --install-location /Library/Audio/Plug-Ins/Components/ \
                   --root ../../Builds/PoZeTool_artefacts/Release/AU/ \
                   PoZeTool-MacOS-${{ env.VERSION }}-AU-UNSIGNED.pkg
          
          # Standalone is special, needs a boolean to always install in /Applications
          pkgbuild --analyze --root ../../Builds/PoZeTool_artefacts/Release/Standalone/ standalone.plist
          plutil -replace BundleIsRelocatable -bool NO standalone.plist
          pkgbuild --identifier com.rvaudiodesign.pkg.app --version ${{ env.VERSION }} --root ../../Builds/PoZeTool_artefacts/Release/Standalone/ --component-plist standalone.plist --install-location "/Applications" "PoZeTool-MacOS-${{ env.VERSION }}-APP-UNSIGNED.pkg"

      - name: Sign MacOS Installers
        if: ${{ matrix.name == 'MacOS' }}
        working-directory: Installers/MacOS
        run: |
          # Sign VST3 Installer
          productsign --sign "${{ secrets.DEVELOPER_ID_INSTALLER }}" PoZeTool-MacOS-${{ env.VERSION }}-VST3-UNSIGNED.pkg PoZeTool-MacOS-${{ env.VERSION }}-VST3.pkg
          
          # Sign AU Installer
          productsign --sign "${{ secrets.DEVELOPER_ID_INSTALLER }}" PoZeTool-MacOS-${{ env.VERSION }}-AU-UNSIGNED.pkg PoZeTool-MacOS-${{ env.VERSION }}-AU.pkg
          
          # Sign Standalone Installer
          productsign --sign "${{ secrets.DEVELOPER_ID_INSTALLER }}" PoZeTool-MacOS-${{ env.VERSION }}-APP-UNSIGNED.pkg PoZeTool-MacOS-${{ env.VERSION }}-APP.pkg

      - name: Generate Installer
        if: ${{ matrix.name == 'Windows' }}
        run: |
          iscc /dAppVersion=${{ env.VERSION }} Installers/Windows/PoZeToolInstaller.iss
          mv "Installers/Windows/Output/${{ env.ARTIFACT_NAME }}.exe" "Installers/Windows/Output/${{ env.INSTALLER_NAME }}.exe"
          mv "Installers/Windows/Output/${{ env.INSTALLER_NAME }}.exe" "${{ env.ARTIFACTS_PATH }}/"
        shell: cmd # Use cmd here to avoid issues with quotes

      - name: Combine MacOS Installers
        if: ${{ matrix.name == 'MacOS' }}
        working-directory: Installers/MacOS
        run: |
          # Build product installer 
          envsubst < distribution.xml.template > distribution.xml
          productbuild --distribution distribution.xml --resources ./ --package-path ./ ${{ env.ARTIFACT_NAME }}-UNSIGNED.pkg

      - name: Sign and notarize final installer
        if: ${{ matrix.name == 'MacOS' }}
        working-directory: Installers/MacOS
        run: |
          # Sign installer
          productsign --sign "${{ secrets.DEVELOPER_ID_INSTALLER }}" "${{ env.ARTIFACT_NAME }}-UNSIGNED.pkg" ${{ env.ARTIFACT_NAME }}.pkg
          
          # Notarize
          xcrun notarytool submit "${{ env.ARTIFACT_NAME }}.pkg" --apple-id ${{ secrets.NOTARIZATION_USERNAME }} --password ${{ secrets.NOTARIZATION_PASSWORD }} --team-id ${{ secrets.TEAM_ID }} --wait
          
          # Staple
          xcrun stapler staple "${{ env.ARTIFACT_NAME }}.pkg"
          
          # Avoid dots in file name
          mv ${{ env.ARTIFACT_NAME }}.pkg ${{ env.INSTALLER_NAME }}.pkg
          
          mv ${{ env.INSTALLER_NAME }}.pkg ../../${{ env.ARTIFACTS_PATH }}

      - name: Clean up keychain after signing
        if: always()
        run: |
          security delete-keychain signing_temp_${{ github.run_id }}.keychain-db || true

      - name: Zip
        if: ${{ matrix.name == 'Linux' }}
        working-directory: ${{ env.ARTIFACTS_PATH }}
        run: |
          7z a -tzip "${{ env.INSTALLER_NAME }}.zip" "-xr!lib${{ env.PRODUCT_NAME }}_SharedCode.a"

      - name: Upload Build (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.INSTALLER_NAME }}
          path: "${{ env.ARTIFACTS_PATH }}/${{ env.INSTALLER_NAME }}.zip"

      - name: Upload Installer (MacOS)
        if: runner.os == 'MacOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.INSTALLER_NAME }}
          path: ${{ env.ARTIFACTS_PATH }}/*.pkg

      - name: Upload Installer (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.INSTALLER_NAME }}
          path: ${{ env.ARTIFACTS_PATH }}/*.exe

  release:
    if: contains(github.ref, 'tags/v')
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Get Artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }}"
          prerelease: false
          # download-artifact puts these files in their own dirs...
          # Using globs sidesteps having to pass the version around
          files: |
            */*.exe
            */*.zip
            */*.pkg
